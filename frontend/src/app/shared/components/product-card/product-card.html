<div [routerLink]="['/products', product()._id]" class="group relative bg-white border border-gray-100 rounded-xl overflow-hidden hover:shadow-2xl transition-all duration-500 transform hover:-translate-y-2 cursor-pointer h-full flex flex-col">
  <!-- Image Container -->
  <div class="relative aspect-[3/4] overflow-hidden bg-gray-50">
    <img [src]="product().images[0]" [alt]="product().name" 
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-out">
    


    <!-- Hover Actions -->
    <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
      <button (click)="addToWishlist($event)" class="bg-white p-3 rounded-full shadow-xl hover:bg-tss-red hover:text-white transition-all transform hover:scale-110">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
      </button>
      <button class="bg-white p-3 rounded-full shadow-xl hover:bg-tss-red hover:text-white transition-all transform hover:scale-110">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="p-5 flex-grow flex flex-col">
    <div class="flex items-center justify-between mb-2">
      <span class="text-[10px] font-black uppercase text-gray-400 tracking-widest">{{ $any(product().category)?.name || 'Uncategorized' }}</span>
      <span class="text-[10px] font-bold text-tss-red uppercase tracking-widest">{{ product().brand }}</span>
    </div>
    
    <h3 class="text-sm font-bold text-gray-900 group-hover:text-tss-red transition-colors mb-4 flex-grow tracking-tight">
      {{ product().name }}
    </h3>

    <div class="flex items-center justify-between mt-auto">
      <div class="flex flex-col">
          <span class="text-lg font-black text-gray-900">₹{{ product().price }}</span>
          <span class="text-[10px] text-gray-400 line-through">₹{{ product().price * 1.5 }}</span>
      </div>
      <button (click)="addToCart($event)" class="bg-gray-900 text-white p-3 rounded-lg hover:bg-tss-red transition-all transform active:scale-95 shadow-lg group/btn">
        <svg class="w-5 h-5 group-hover/btn:animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
      </button>
    </div>
  </div>
</div>
