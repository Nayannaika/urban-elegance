<nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-100 shadow-sm px-6 py-2 flex items-center justify-between">
  <!-- Left Side: Nav Links -->
  <div class="flex items-center space-x-8">
    <div class="flex flex-col cursor-pointer group">
      <span class="text-sm font-bold tracking-wider text-gray-800 uppercase">Men</span>
      <div class="h-0.5 bg-tss-red scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
    </div>
    <div class="flex flex-col cursor-pointer group">
      <span class="text-sm font-bold tracking-wider text-gray-800 uppercase">Women</span>
      <div class="h-0.5 bg-tss-red scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
    </div>
    <div class="flex flex-col cursor-pointer group">
      <span class="text-sm font-bold tracking-wider text-gray-800 uppercase">Kids</span>
      <div class="h-0.5 bg-tss-red scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
    </div>
  </div>

  <div class="flex flex-col items-center cursor-pointer" routerLink="/">
    <div class="flex items-center space-x-2">
      <img src="assets/logo-mascot.png" alt="Urban Elegance" class="w-8 h-8 object-contain">
      <span class="text-xl font-black tracking-tighter text-gray-900 uppercase">Urban <span class="text-tss-red">Elegance</span></span>
    </div>
  </div>

  <div class="flex items-center space-x-6">
    <!-- Search Bar -->
    <div class="relative hidden lg:block">
      <input type="text" id="global-search" name="search" placeholder="What are you looking for?" 
        class="bg-gray-100 border-none rounded-full py-2 px-6 pl-10 text-xs w-64 focus:ring-1 focus:ring-tss-red focus:bg-white transition-all outline-none">
      <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">

      </svg>
    </div>

    <!-- Icons -->
    <div class="flex items-center space-x-5 text-gray-700">
      <a [routerLink]="profileRoute" class="hover:text-tss-red transition-colors relative group cursor-pointer block">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>

      <a routerLink="/wishlist" class="hover:text-tss-red transition-colors relative group block cursor-pointer">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">

        </svg>
        <span class="absolute -top-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Wishlist</span>
        <span *ngIf="((wishlist$ | async)?.length || 0) > 0" class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full">{{ (wishlist$ | async)?.length }}</span>
      </a>
      
      <a routerLink="/cart" class="hover:text-tss-red transition-colors relative group block cursor-pointer">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
        <span class="absolute -top-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Cart</span>
        <span *ngIf="(cartCount$ | async)! > 0" class="absolute -top-1 -right-1 bg-tss-red text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full">{{ cartCount$ | async }}</span>

<div class="h-14"></div> <!-- Spacer for fixed navbar -->
