<div class="animate-fade-in-up delay-100">
      
      <!-- Gift Cards Section -->
      <h3 class="text-2xl font-bold font-outfit text-slate-900 mb-6 border-b border-slate-100 pb-4">Gift Card Balance</h3>
      
      <div *ngIf="isLoading()" class="animate-pulse h-24 bg-slate-200 rounded-2xl mb-10 w-full md:w-1/2"></div>
      
      <div *ngIf="!isLoading()" class="bg-gradient-to-r from-slate-900 to-slate-800 p-6 rounded-2xl shadow-lg relative overflow-hidden mb-12 w-full md:w-1/2">
        <div class="absolute top-[-10%] right-[-10%] w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
        <p class="text-indigo-200 text-sm font-bold tracking-wider uppercase mb-1 relative z-10">Available Balance</p>
        <p class="text-4xl text-white font-extrabold tracking-tight relative z-10">₹{{ giftCardBalance().toFixed(2) }}</p>
        
        <div class="mt-4 flex space-x-3 relative z-10">
           <button class="px-4 py-2 bg-white text-slate-900 text-sm font-semibold rounded-lg shadow hover:bg-slate-50 transition-colors">Redeem Code</button>
        </div>
      </div>

      <!-- Saved Cards Section -->
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold font-outfit text-slate-900">Saved Cards</h3>
        <button class="px-4 py-2 bg-indigo-50 text-indigo-700 font-semibold rounded-xl border border-indigo-100 hover:bg-indigo-100 transition-colors focus:ring-2 focus:ring-indigo-500 focus:outline-none flex items-center space-x-2 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          <span>Add Card</span>
        </button>
      </div>

      <div *ngIf="isLoading()" class="animate-pulse flex space-x-4">
        <div class="flex-1 space-y-4 py-1">
          <div class="h-32 bg-slate-200 rounded-xl"></div>
        </div>
      </div>

      <div *ngIf="!isLoading() && savedCards().length === 0" class="text-center py-12 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
        <svg class="mx-auto h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
        </svg>
        <h3 class="mt-2 text-sm font-medium text-slate-900">No saved cards</h3>
        <p class="mt-1 text-sm text-slate-500">Add a credit or debit card for faster checkout.</p>
      </div>
      
      <div *ngIf="!isLoading() && savedCards().length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let card of savedCards()" class="bg-white border p-6 rounded-2xl shadow-sm relative group transition-all"
             [ngClass]="{'border-indigo-500 ring-1 ring-indigo-500': card.isDefault, 'border-slate-200 hover:border-slate-300': !card.isDefault}">
          
          <div class="flex justify-between items-start mb-4">
             <div class="w-12 h-8 bg-slate-100 rounded flex items-center justify-center font-bold text-xs text-slate-500 uppercase tracking-widest">{{ card.brand }}</div>
             <span *ngIf="card.isDefault" class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-indigo-100 text-indigo-800">
              Default
            </span>
          </div>

          <p class="text-lg font-mono text-slate-800 tracking-widest mb-1">**** **** **** {{ card.last4 }}</p>
          <div class="flex justify-between items-center text-xs text-slate-500 uppercase tracking-wider font-semibold">
              <span>{{ card.cardHolder }}</span>
              <span>Exp {{ card.expiry }}</span>
          </div>
          
          <div class="absolute inset-0 bg-white/90 backdrop-blur-sm rounded-2xl border border-slate-200 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center space-x-4">
            <button class="text-slate-700 hover:text-indigo-600 text-sm font-semibold transition-colors bg-slate-100 hover:bg-indigo-50 px-4 py-2 rounded-lg">Edit</button>
            <button class="text-slate-700 hover:text-rose-600 text-sm font-semibold transition-colors bg-slate-100 hover:bg-rose-50 px-4 py-2 rounded-lg">Remove</button>
          </div>
        </div>
      </div>
      
    </div>
