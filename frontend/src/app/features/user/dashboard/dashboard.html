<div class="min-h-screen bg-slate-50 pt-10 pb-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col md:flex-row gap-8">
      
      <!-- Sidebar -->
      <div class="w-full md:w-64 flex-shrink-0">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden sticky top-24">
          <div class="p-6 border-b border-slate-100 bg-slate-900 text-white">
            <h2 class="text-xl font-bold font-outfit">My Account</h2>
            <p class="text-sm text-slate-400 mt-1 font-inter">Manage your details</p>
          </div>
          
          <nav class="p-3 space-y-1">
            <a *ngFor="let item of menuItems" 
               [routerLink]="['/user', item.path]"
               routerLinkActive="bg-indigo-50 text-indigo-600 font-semibold"
               [routerLinkActiveOptions]="{exact: false}"
               class="flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer group font-inter text-sm">
              <svg [ngClass]="{'text-indigo-600': false, 'text-slate-400 group-hover:text-slate-500': true}" 
                   class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"></path>
              </svg>
              <span>{{ item.label }}</span>
            </a>
          </nav>

          <div class="p-3 border-t border-slate-100 mt-2">
            <button (click)="logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl justify-center text-rose-600 hover:bg-rose-50 transition-colors font-semibold font-inter text-sm">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
              </svg>
              <span>Sign Out</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Main Content Area -->
      <div class="flex-1 min-w-0">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 min-h-[600px] animate-fade-in">
          <router-outlet></router-outlet>
        </div>
      </div>

    </div>
  </div>
</div>
