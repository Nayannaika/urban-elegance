<div class="flex h-screen bg-gray-50 text-gray-800 font-inter">
  
  <!-- Sidebar Container -->
  <aside 
    [class.translate-x-0]="isSidebarOpen"
    [class.-translate-x-full]="!isSidebarOpen"
    class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-y-auto lg:flex focus:outline-none flex flex-col shadow-2xl">
      
      <!-- Brand Area -->
      <div class="flex items-center justify-center py-6 px-4 bg-slate-950 border-b border-white/5">
         <span class="text-xl font-bold tracking-tight font-outfit uppercase">Urban <span class="text-indigo-400">Elegance</span></span>
         <span class="ml-2 text-xs bg-indigo-500 text-white px-2 py-0.5 rounded-full font-bold">PRO</span>
      </div>

      <!-- Navigation Links -->
      <nav class="flex-1 px-4 py-8 space-y-2 overflow-y-auto w-full">
         <a routerLink="/admin/dashboard" routerLinkActive="bg-indigo-600 text-white shadow-md shadow-indigo-600/20" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all group">
            <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Dashboard
         </a>

         <a routerLink="/admin/orders" routerLinkActive="bg-indigo-600 text-white shadow-md shadow-indigo-600/20" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all group">
            <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
            </svg>
            Orders
         </a>

         <a routerLink="/admin/products" routerLinkActive="bg-indigo-600 text-white shadow-md shadow-indigo-600/20" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all group">
            <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
            </svg>
            Products
         </a>

         <a routerLink="/admin/users" routerLinkActive="bg-indigo-600 text-white shadow-md shadow-indigo-600/20" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all group">
            <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            Users
         </a>

         <a routerLink="/admin/analytics" routerLinkActive="bg-indigo-600 text-white shadow-md shadow-indigo-600/20" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all group">
            <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 13v-1m4 1v-3m4 3V8M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
            </svg>
            Analytics
         </a>

         <a routerLink="/admin/banners" routerLinkActive="bg-indigo-600 text-white shadow-md shadow-indigo-600/20" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all group">
            <svg class="w-5 h-5 mr-3 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            Banners
         </a>
      </nav>
      
      <!-- Footer / Logout -->
      <div class="p-4 border-t border-white/5 pb-8">
         <a (click)="logout()" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-rose-400 hover:bg-rose-500/10 transition-all cursor-pointer group">
            <svg class="w-5 h-5 mr-3 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            Logout
         </a>
      </div>
  </aside>

  <!-- Mobile Overlay -->
  <div *ngIf="isSidebarOpen" (click)="toggleSidebar()" class="fixed inset-0 z-40 bg-slate-900/80 backdrop-blur-sm lg:hidden transition-opacity"></div>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col overflow-hidden">
     <!-- Top Header -->
     <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-gray-100 shadow-sm z-30">
        <button (click)="toggleSidebar()" class="text-gray-500 hover:text-indigo-600 focus:outline-none lg:hidden transition-colors">
           <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
           </svg>
        </button>
        
        <div class="flex-1"></div> <!-- Spacer -->

        <div class="flex items-center space-x-4">
           <!-- Notifications -->
           <button class="relative p-2 text-gray-400 hover:text-indigo-600 transition-colors bg-gray-50 hover:bg-indigo-50 rounded-full">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
              </svg>
              <span class="absolute top-1 right-1 flex items-center justify-center w-3 h-3 text-[8px] font-bold text-white bg-rose-500 border-2 border-white rounded-full"></span>
           </button>
           
           <!-- User Profile -->
           <div class="flex items-center cursor-pointer hover:opacity-80 transition-opacity">
              <div class="w-9 h-9 bg-indigo-100 text-indigo-700 font-bold rounded-full flex items-center justify-center shadow-inner border border-indigo-200">
                 A
              </div>
           </div>
        </div>
     </header>

     <!-- Router Outlet -->
     <div class="flex-1 overflow-auto bg-slate-50 p-6 md:p-8">
         <router-outlet></router-outlet>
     </div>
  </main>
</div>
