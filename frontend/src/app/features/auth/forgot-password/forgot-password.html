<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-gray-900 to-tss-red"></div>
    
    <div>
      <h2 class="mt-2 text-center text-3xl font-black text-gray-900 tracking-tight">
        Reset Password
      </h2>
      <p class="mt-3 text-center text-sm font-medium text-gray-500 max-w-sm mx-auto">
        Enter your email address and we'll send you a link to reset your password.
      </p>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage()" class="p-4 bg-emerald-50 border border-emerald-100 rounded-xl flex flex-col gap-3 text-emerald-700 animate-fade-in-up">
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-sm font-semibold">{{ successMessage() }}</p>
      </div>
      
      <!-- Local Dev URL Inject -->
      <div *ngIf="resetUrl()" class="mt-4 pt-4 border-t border-emerald-200/50">
        <p class="text-xs font-medium text-emerald-800 mb-2">Since this is a college project and email is not actively configured, you can use this secure link directly:</p>
        <a [href]="resetUrl()" class="inline-flex items-center justify-center w-full px-4 py-2 text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition-colors shadow-sm cursor-pointer">
          Reset Password Now
          <svg class="w-4 h-4 ml-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </a>
      </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage()" class="p-4 bg-rose-50 border border-rose-100 rounded-xl flex gap-3 text-rose-700 animate-fade-in-up">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-sm font-semibold">{{ errorMessage() }}</p>
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()" *ngIf="!successMessage()">
      <div>
        <label for="email" class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">Email Address</label>
        <div class="relative">
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
            [(ngModel)]="email"
            class="appearance-none block w-full px-4 py-3.5 border-2 border-gray-100 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-0 focus:border-gray-900 transition-colors bg-gray-50/50 focus:bg-white font-medium sm:text-sm"
            placeholder="you@example.com"
          />
        </div>
      </div>

      <div>
        <button
          type="submit"
          [disabled]="isSubmitting()"
          class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-black uppercase tracking-[0.15em] rounded-xl text-white bg-gray-900 hover:bg-tss-red focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-all transform active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed shadow-xl shadow-gray-900/10 hover:shadow-red-900/20"
        >
          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
            <svg *ngIf="!isSubmitting()" class="h-5 w-5 text-gray-700 group-hover:text-red-300 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <svg *ngIf="isSubmitting()" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          {{ isSubmitting() ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </div>
    </form>
    
    <div class="mt-6 flex items-center justify-center">
      <div class="text-sm">
        <a routerLink="/login" class="font-bold text-gray-900 hover:text-tss-red transition-colors">
          &larr; Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
