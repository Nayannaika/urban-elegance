<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 animate-fade-in-up">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-gray-900 to-tss-red"></div>
    
    <div>
      <h2 class="mt-2 text-center text-3xl font-black text-gray-900 tracking-tight">
        New Password
      </h2>
      <p class="mt-3 text-center text-sm font-medium text-gray-500 max-w-sm mx-auto">
        Please enter your new password below.
      </p>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage()" class="p-4 bg-emerald-50 border border-emerald-100 rounded-xl flex gap-3 text-emerald-700 animate-fade-in-up">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-sm font-semibold">{{ successMessage() }}</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage()" class="p-4 bg-rose-50 border border-rose-100 rounded-xl flex gap-3 text-rose-700 animate-fade-in-up">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-sm font-semibold">{{ errorMessage() }}</p>
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()" *ngIf="!successMessage() && token">
      
      <div class="space-y-4">
        <div>
          <label for="password" class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">New Password</label>
          <div class="relative">
            <input
              id="password"
              name="password"
              type="password"
              required
              [(ngModel)]="password"
              class="appearance-none block w-full px-4 py-3.5 border-2 border-gray-100 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-0 focus:border-gray-900 transition-colors bg-gray-50/50 focus:bg-white font-medium sm:text-sm"
              placeholder="••••••••"
            />
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 ml-1">Confirm Password</label>
          <div class="relative">
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              required
              [(ngModel)]="confirmPassword"
              class="appearance-none block w-full px-4 py-3.5 border-2 border-gray-100 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-0 focus:border-gray-900 transition-colors bg-gray-50/50 focus:bg-white font-medium sm:text-sm"
              placeholder="••••••••"
            />
          </div>
        </div>
      </div>

      <div>
        <button
          type="submit"
          [disabled]="isSubmitting()"
          class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-black uppercase tracking-[0.15em] rounded-xl text-white bg-gray-900 hover:bg-tss-red focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-all transform active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed shadow-xl shadow-gray-900/10 hover:shadow-red-900/20"
        >
          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
             <svg *ngIf="!isSubmitting()" class="h-5 w-5 text-gray-700 group-hover:text-red-300 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <svg *ngIf="isSubmitting()" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          {{ isSubmitting() ? 'Updating...' : 'Update Password' }}
        </button>
      </div>
    </form>
    
    <div *ngIf="!token" class="mt-6 flex flex-col items-center justify-center">
        <a routerLink="/forgot-password" class="mb-4 text-sm font-bold text-tss-red hover:text-red-700 transition-colors">
            Request new reset link
        </a>
    </div>

  </div>
</div>
